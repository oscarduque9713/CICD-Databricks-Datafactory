name: Deploy-ADF-Infrastructure

on:
  push:
    branches:
      - main  # Se dispara cuando haces merge a main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Paso crítico: Validar y generar la plantilla desde tus carpetas individuales
      - name: export-arm-template
        run: |
          npm install @microsoft/azure-data-factory-utilities
          # Este comando convierte tus carpetas en el archivo final de despliegue
          node node_modules/@microsoft/azure-data-factory-utilities/lib/index.js export ${{ github.workspace }} /subscriptions/${{ secrets.SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.RG }}/providers/Microsoft.DataFactory/factories/${{ secrets.ADF_NAME }} "ExportedArmTemplate"

      - name: Deploy ARM Template
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: ${{ secrets.RG }}
          template: ./ExportedArmTemplate/ARMTemplateForFactory.json
          # Aquí es donde pasas tus parámetros de producción
          parameters: >
            ./ExportedArmTemplate/ARMTemplateParametersForFactory.json
            factoryName=${{ secrets.ADF_PROD_NAME }}
            PP_PROECT_OSCAR_DEV_properties_parameters_linked_service_defaultValue=ls_adb_prod
            PP_PROECT_OSCAR_DEV_properties_parameters_base_path_defaultValue=/Workspace/Users/duque.smart1397@outlook.com/deploy/
